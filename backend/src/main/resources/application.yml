server:
  port: 18180

spring:
  application:
    name: bb-play-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:192.168.12.22}:${DB_PORT:5432}/${DB_NAME:bbplay}?currentSchema=${DB_SCHEMA:public}
    username: ${DB_USER:bbplay}
    password: ${DB_PASSWORD:bbplay}
    driver-class-name: org.postgresql.Driver
  jackson:
    default-property-inclusion: non_null
  sql:
    init:
      mode: never
  data:
    redis:
      host: ${REDIS_HOST:192.168.12.12}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:Icit#0217}
      database: ${REDIS_DB:7}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:bb-play-secret-key-for-jwt-token-generation-minimum-256-bits}
  expiration: ${JWT_EXPIRATION:2592000000}
